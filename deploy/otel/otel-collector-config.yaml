receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  otlp/aspire:
    endpoint: aspire-dashboard:18889
    tls:
      insecure: true

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/aspire, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/aspire, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/aspire, debug]