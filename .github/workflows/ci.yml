# .github/workflows/ci.yml

name: CI

on:
  pull_request:
    branches:
      - master

  push:
    branches:
      - master

  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"
  CONFIGURATION: Release

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration $CONFIGURATION --no-restore

      - name: Test
        run: dotnet test --configuration $CONFIGURATION --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/TestResults/*.trx"

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Build Docker images
        run: |
          docker compose build \
            uploadservice-api \
            reportservice-api \
            processingservice-worker \
            uploadservice-db-migrator \
            reportservice-db-migrator \
            processingservice-db-migrator

  compose-deploy-validation:
    name: compose-deploy-validation
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Prepare environment file
        run: |
          if [ -f .env.example ]; then cp .env.example .env; fi

      - name: Start local stack
        run: docker compose up -d --build

      - name: Show running containers
        if: always()
        run: |
          echo "---- Docker Compose services ----"
          docker compose ps -a

      - name: Dump RabbitMQ diagnostics
        if: always()
        run: |
          echo "---- RabbitMQ health inspect ----"
          docker inspect fiapsecure-rabbitmq --format='{{json .State.Health}}' || true

          echo "---- RabbitMQ logs ----"
          docker logs fiapsecure-rabbitmq || true

          echo "---- RabbitMQ cookie init logs ----"
          docker logs fiapsecure-rabbitmq-cookie-init || true

          echo "---- RabbitMQ init logs ----"
          docker logs fiapsecure-rabbitmq-init || true

      - name: Stop local stack
        if: always()
        run: docker compose down -v
