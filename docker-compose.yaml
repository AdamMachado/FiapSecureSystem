version: "3.9"

name: fiap-secure-systems

services:
  uploadservice-api:
    container_name: uploadservice-api
    build:
      context: .
      dockerfile: src/Services/UploadService/UploadService.Api/Dockerfile
    image: uploadservice-api:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      uploadservice-db-migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${UPLOAD_API_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080

      Database__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Database__Schema: ${DATABASE_SCHEMA}
      Database__EnableSensitiveDataLogging: ${DATABASE_ENABLE_SENSITIVE_DATA_LOGGING}

      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__VirtualHost: ${RABBITMQ_VHOST}
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS}
      RabbitMq__ClientProvidedName: ${RABBITMQ_CLIENT_PROVIDED_NAME}
      RabbitMq__UseSsl: ${RABBITMQ_USE_SSL}
      RabbitMq__PrefetchCount: ${RABBITMQ_PREFETCH_COUNT}

      Storage__BucketName: ${MINIO_BUCKET_NAME}
      Storage__AutoCreateBucket: ${STORAGE_AUTO_CREATE_BUCKET}

      Upload__MaxFileSizeInBytes: ${UPLOAD_MAX_FILE_SIZE_BYTES}
      Upload__SupportedContentTypes__0: application/pdf
      Upload__SupportedContentTypes__1: image/png
      Upload__SupportedContentTypes__2: image/jpeg
      Upload__SupportedContentTypes__3: image/jpg

      MinIo__Endpoint: minio:9000
      MinIo__AccessKey: ${MINIO_ROOT_USER}
      MinIo__SecretKey: ${MINIO_ROOT_PASSWORD}
      MinIo__UseSsl: ${MINIO_USE_SSL}

      OpenTelemetry__ServiceName: ${OTEL_SERVICE_NAME}
      OpenTelemetry__ServiceVersion: ${OTEL_SERVICE_VERSION}
      OpenTelemetry__Otlp__Endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    networks:
      - soat-net

  postgres:
    container_name: fiapsecure-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - soat-net

  pgadmin:
    container_name: fiapsecure-pgadmin
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - soat-net

  uploadservice-db-migrator:
    container_name: uploadservice-db-migrator
    build:
      context: .
      dockerfile: src/Services/UploadService/UploadService.Infrastructure/Dockerfile.migrator
    image: uploadservice-db-migrator:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      Database__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Database__Schema: ${DATABASE_SCHEMA}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    restart: "no"
    networks:
      - soat-net

  rabbitmq:
    container_name: fiapsecure-rabbitmq
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    # volumes:
    #   - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - soat-net

  rabbitmq-init:
    container_name: fiapsecure-rabbitmq-init
    image: curlimages/curl:8.8.0
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_MANAGEMENT_PORT: 15672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - ./deploy/rabbitmq/init-rabbitmq.sh:/init-rabbitmq.sh:ro
    entrypoint: ["/bin/sh", "/init-rabbitmq.sh"]
    restart: "no"
    networks:
      - soat-net

  minio:
    container_name: fiapsecure-minio
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - soat-net

  minio-init:
    container_name: fiapsecure-minio-init
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET_NAME} &&
      /usr/bin/mc anonymous set private local/${MINIO_BUCKET_NAME} &&
      exit 0
      "
    restart: "no"
    networks:
      - soat-net

  otel-collector:
    container_name: fiapsecure-otel-collector
    image: otel/opentelemetry-collector:0.101.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./deploy/otel/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT}:4317"
      - "${OTEL_HTTP_PORT}:4318"
    networks:
      - soat-net

networks:
  soat-net:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
  pgadmin_data: