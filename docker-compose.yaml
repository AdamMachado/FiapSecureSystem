name: fiap-secure-systems

services:
  web-app:
    container_name: FSS-web-app
    build:
      context: .
      dockerfile: src/WebApp/Fiap.SecureSystem.WebApp/Dockerfile
    image: web-app:local
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "${WEB_APP_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080

      ApiGateway__BaseUrl: http://api-gateway:8080

      OpenTelemetry__ServiceName: SOAT.WebApp
      OpenTelemetry__ServiceVersion: ${OTEL_SERVICE_VERSION}
      OpenTelemetry__Otlp__Endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    networks:
      - soat-net
  
  api-gateway:
    container_name: FSS-api-gateway
    build:
      context: .
      dockerfile: src/ApiGateway/Fiap.SecureSystem.ApiGateway/Dockerfile
    image: api-gateway:local
    restart: unless-stopped
    depends_on:
      uploadservice-api:
        condition: service_healthy
      reportservice-api:
        condition: service_healthy
    ports:
      - "${API_GATEWAY_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080

      ExternalServices__UploadService__BaseUrl: http://uploadservice-api:8080
      ExternalServices__ReportService__BaseUrl: http://reportservice-api:8080

      OpenTelemetry__ServiceName: SOAT.ApiGateway
      OpenTelemetry__ServiceVersion: ${OTEL_SERVICE_VERSION}
      OpenTelemetry__Otlp__Endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - soat-net
  
  uploadservice-api:
    container_name: FSS-uploadservice-api
    build:
      context: .
      dockerfile: src/Services/UploadService/UploadService.Api/Dockerfile
    image: uploadservice-api:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      uploadservice-db-migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${UPLOAD_API_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080

      Database__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Database__Schema: ${UPLOAD_DATABASE_SCHEMA}
      Database__EnableSensitiveDataLogging: ${DATABASE_ENABLE_SENSITIVE_DATA_LOGGING}

      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__VirtualHost: ${RABBITMQ_VHOST}
      RabbitMq__Username: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASS}
      RabbitMq__ClientProvidedName: ${RABBITMQ_UPLOAD_CLIENT_PROVIDED_NAME}
      RabbitMq__UseSsl: ${RABBITMQ_USE_SSL}
      RabbitMq__PrefetchCount: ${RABBITMQ_PREFETCH_COUNT}

      Storage__BucketName: ${MINIO_BUCKET_NAME}
      Storage__AutoCreateBucket: ${STORAGE_AUTO_CREATE_BUCKET}

      Upload__MaxFileSizeInBytes: ${UPLOAD_MAX_FILE_SIZE_BYTES}
      Upload__SupportedContentTypes__0: application/pdf
      Upload__SupportedContentTypes__1: image/png
      Upload__SupportedContentTypes__2: image/jpeg
      Upload__SupportedContentTypes__3: image/jpg

      MinIo__Endpoint: minio:9000
      MinIo__AccessKey: ${MINIO_ROOT_USER}
      MinIo__SecretKey: ${MINIO_ROOT_PASSWORD}
      MinIo__UseSsl: ${MINIO_USE_SSL}

      OpenTelemetry__ServiceName: SOAT.UploadService.Api
      OpenTelemetry__ServiceVersion: ${OTEL_SERVICE_VERSION}
      OpenTelemetry__Otlp__Endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - soat-net
 
  reportservice-api:
    container_name: FSS-reportservice-api
    build:
      context: .
      dockerfile: src/Services/ReportService/ReportService.Api/Dockerfile
    image: reportservice-api:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      reportservice-db-migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${REPORT_API_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080

      Database__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Database__Schema: ${REPORT_DATABASE_SCHEMA}
      Database__EnableSensitiveDataLogging: ${DATABASE_ENABLE_SENSITIVE_DATA_LOGGING}

      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__VirtualHost: ${RABBITMQ_VHOST}
      RabbitMq__Username: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASS}
      RabbitMq__ClientProvidedName: ${RABBITMQ_REPORT_CLIENT_PROVIDED_NAME}
      RabbitMq__UseSsl: ${RABBITMQ_USE_SSL}
      RabbitMq__PrefetchCount: ${RABBITMQ_PREFETCH_COUNT}

      Storage__BucketName: ${MINIO_REPORT_BUCKET_NAME}
      Storage__AutoCreateBucket: ${STORAGE_AUTO_CREATE_BUCKET}

      MinIo__Endpoint: minio:9000
      MinIo__AccessKey: ${MINIO_ROOT_USER}
      MinIo__SecretKey: ${MINIO_ROOT_PASSWORD}
      MinIo__UseSsl: ${MINIO_USE_SSL}

      OpenTelemetry__ServiceName: SOAT.ReportService.Api
      OpenTelemetry__ServiceVersion: ${OTEL_SERVICE_VERSION}
      OpenTelemetry__Otlp__Endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - soat-net

  processingservice-worker:
    container_name: FSS-processingservice-worker
    build:
      context: .
      dockerfile: src/Services/ProcessingService/ProcessingService.Worker/Dockerfile
    image: processingservice-worker:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      processingservice-db-migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DOTNET_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}

      Database__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Database__Schema: ${PROCESSING_DATABASE_SCHEMA}
      Database__EnableSensitiveDataLogging: ${DATABASE_ENABLE_SENSITIVE_DATA_LOGGING}

      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__VirtualHost: ${RABBITMQ_VHOST}
      RabbitMq__Username: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASS}
      RabbitMq__ClientProvidedName: ${RABBITMQ_PROCESSING_CLIENT_PROVIDED_NAME}
      RabbitMq__UseSsl: ${RABBITMQ_USE_SSL}
      RabbitMq__PrefetchCount: ${RABBITMQ_PREFETCH_COUNT}

      MinIo__Endpoint: minio:9000
      MinIo__AccessKey: ${MINIO_ROOT_USER}
      MinIo__SecretKey: ${MINIO_ROOT_PASSWORD}
      MinIo__UseSsl: ${MINIO_USE_SSL}

      OpenAI__ApiKey: ${OPENAI_API_KEY}
      OpenAI__Model: ${OPENAI_MODEL}
      OpenAI__ServiceTier: ${OPENAI_SERVICE_TIER}

      OpenTelemetry__ServiceName: SOAT.ProcessingService.Worker
      OpenTelemetry__ServiceVersion: ${OTEL_SERVICE_VERSION}
      OpenTelemetry__Otlp__Endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}

      AiPipeline__UseStubAnalyzer: ${AI_PIPELINE_USE_STUB_ANALYZER}
    networks:
      - soat-net

  postgres:
    container_name: fiapsecure-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres && psql -U ${POSTGRES_USER} -d postgres -tAc \"SELECT 1 FROM pg_database WHERE datname='${POSTGRES_DB}'\" | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - soat-net

  pgadmin:
    container_name: fiapsecure-pgadmin
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - soat-net

  uploadservice-db-migrator:
    container_name: uploadservice-db-migrator
    build:
      context: .
      dockerfile: src/Services/UploadService/UploadService.Infrastructure/Dockerfile.migrator
    image: uploadservice-db-migrator:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      Database__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Database__Schema: ${UPLOAD_DATABASE_SCHEMA}
      Database__EnableSensitiveDataLogging: ${DATABASE_ENABLE_SENSITIVE_DATA_LOGGING}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DOTNET_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    restart: "no"
    networks:
      - soat-net

  reportservice-db-migrator:
    container_name: reportservice-db-migrator
    build:
      context: .
      dockerfile: src/Services/ReportService/ReportService.Infrastructure/Dockerfile.migrator
    image: reportservice-db-migrator:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      Database__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Database__Schema: ${REPORT_DATABASE_SCHEMA}
      Database__EnableSensitiveDataLogging: ${DATABASE_ENABLE_SENSITIVE_DATA_LOGGING}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DOTNET_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    restart: "no"
    networks:
      - soat-net

  processingservice-db-migrator:
    container_name: processingservice-db-migrator
    build:
      context: .
      dockerfile: src/Services/ProcessingService/ProcessingService.Infrastructure/Dockerfile.migrator
    image: processingservice-db-migrator:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      Database__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Database__Schema: ${PROCESSING_DATABASE_SCHEMA}
      Database__EnableSensitiveDataLogging: ${DATABASE_ENABLE_SENSITIVE_DATA_LOGGING}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DOTNET_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    restart: "no"
    networks:
      - soat-net

  rabbitmq:
    container_name: fiapsecure-rabbitmq
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_port_listener 15672"
        ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 50s
    networks:
      - soat-net

  rabbitmq-init:
    container_name: fiapsecure-rabbitmq-init
    image: curlimages/curl:8.8.0
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_MANAGEMENT_PORT: 15672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - ./deploy/rabbitmq/init-rabbitmq.sh:/init-rabbitmq.sh:ro
    entrypoint: ["/bin/sh", "/init-rabbitmq.sh"]
    restart: "no"
    networks:
      - soat-net

  minio:
    container_name: fiapsecure-minio
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - soat-net

  minio-init:
    container_name: fiapsecure-minio-init
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET_NAME} &&
      /usr/bin/mc anonymous set private local/${MINIO_BUCKET_NAME} &&
      /usr/bin/mc mb --ignore-existing local/${MINIO_REPORT_BUCKET_NAME} &&
      /usr/bin/mc anonymous set private local/${MINIO_REPORT_BUCKET_NAME} &&
      exit 0
      "
    restart: "no"
    networks:
      - soat-net

  aspire-dashboard:
    container_name: fiapsecure-aspire-dashboard
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    restart: unless-stopped
    ports:
      - "${ASPIRE_DASHBOARD_PORT}:18888"
      - "${ASPIRE_OTLP_GRPC_PORT}:18889"
    networks:
      - soat-net

  otel-collector:
    container_name: fiapsecure-otel-collector
    image: otel/opentelemetry-collector:0.101.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    depends_on:
      aspire-dashboard:
        condition: service_started
    volumes:
      - ./deploy/otel/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT}:4317"
      - "${OTEL_HTTP_PORT}:4318"
    networks:
      - soat-net

networks:
  soat-net:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
  pgadmin_data:
